<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MotionGraph Pro</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#1e1e1e;
            color:white;
        }

        #app{
            padding:20px;
        }

        h1{
            color:#4FC3F7;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4FC3F7;
            color:black;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }
    </style>

</head>

<body>

<div id="app">

<h1>MotionGraph Pro</h1>

<p>Plugin Loaded Successfully</p>

<br>

<button id="helloBtn">
Hello After Effects
</button>

</div>

<script>

document
.getElementById("helloBtn")
.addEventListener("click",function(){

    alert("MotionGraph Pro is working!");

});

</script>

</body>
</html>
